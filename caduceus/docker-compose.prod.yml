# Caduceus 生产环境 Docker Compose 配置
# 包含 Nginx、PostgreSQL、Redis、后端和前端服务

version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: caduceus-nginx
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - backend_static:/usr/share/nginx/html/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: caduceus-postgres
    environment:
      POSTGRES_DB: caduceus
      POSTGRES_USER: caduceus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caduceus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Redis
  redis:
    image: redis:7-alpine
    container_name: caduceus-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Django 后端
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: caduceus-backend
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: caduceus
      POSTGRES_USER: caduceus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - backend_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caduceus-frontend
    volumes:
      - frontend_dist:/app/dist
    restart: always

volumes:
  postgres_data:
  redis_data:
  backend_static:
  frontend_dist: